<script type="text/babel">

// ─── PDF Parser (PDF.js) ────────────────────────
async function parsePoolwerxPDF(file) {
  if (!window.pdfjsLib) {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
    window.pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  const buf = await file.arrayBuffer();
  const pdfDoc = await window.pdfjsLib.getDocument({ data: buf }).promise;
  let txt = '';
  for (let i = 1; i <= pdfDoc.numPages; i++) {
    const page = await pdfDoc.getPage(i);
    const content = await page.getTextContent();
    txt += content.items.map(item => item.str).join(' ') + '\n';
  }
  console.log('=== PDF RAW TEXT ===\n' + txt + '\n=== END ===');

  // Helper: find value before a label (Poolwerx PDF has values BEFORE labels in table)
  // PDF.js extracts table cells in reading order: value, prev-value, label, range
  const grabBefore = (label) => {
    // Try: number immediately before label (with optional whitespace)
    const re = new RegExp('([\\d.]+)\\s+' + label, 'i');
    const m = txt.match(re);
    if (m) return parseFloat(m[1]);
    // Fallback: number after label
    const re2 = new RegExp(label + '[\\s\\S]{0,30}?([\\d.]+)', 'i');
    const m2 = txt.match(re2);
    return m2 ? parseFloat(m2[1]) : null;
  };

  // Parse date
  const dateM = txt.match(/Tested\s+(\d{1,2}\s+\w+\s+\d{4})/i);
  const date = dateM ? dateM[1] : 'Unknown date';

  // Each metric value appears before its label in the Poolwerx PDF table
  const ph     = grabBefore('pH');
  const freeCl = grabBefore('Free Chlorine');
  const combCl = grabBefore('Combined Chlorine');
  const salt   = grabBefore('Salt');
  const alk    = grabBefore('Total Alk');
  const caHard = grabBefore('Calcium Hardness');
  const cya    = grabBefore('Cyanuric Acid');
  const phos   = grabBefore('Phosphates');

  const lsiM = txt.match(/([-\d.]+)\s*LANGELIER/i);
  const lsi  = lsiM ? parseFloat(lsiM[1]) : null;

  const poolM = txt.match(/(\d[\d,]+)\s*L/);
  const pool  = poolM ? poolM[0] : '';

  // Parse RECOMMENDATIONS section — extract "Add X of Y" lines
  const recs = [];
  const recsM = txt.match(/RECOMMENDATIONS?[\s\S]*?(?:ADDITIONAL|PRODUCT|$)/i);
  if (recsM) {
    const recsText = recsM[0];
    // Split into numbered sections: "1 PH", "2 COMBINED CHLORINE", etc.
    const sections = recsText.split(/\b(\d+)\s+([A-Z][A-Z\s]+?)(?=\s*Add|\s*\d+\s+[A-Z])/g);
    // More reliable: just scan for "Add {number}{unit}" patterns — these are the dose lines
    // e.g. "Add 500 mls of Hydrochloric Acid" or "Add 2.2 kg of Vitalyse Calcium Up"
    const doseRe = /Add\s+[\d.]+\s*(?:mls?|g|kg|L|tabs?)\s+of\s+[^.\n]{3,60}/gi;
    const doseLines = recsText.match(doseRe) || [];
    
    // Also try "Add {number}{unit}" without "of"
    const doseRe2 = /Add\s+[\d.]+\s*(?:mls?|g|kg|L|tabs?)[^.\n]{0,50}/gi;
    
    // Pair each dose with its parameter section header
    const sectionBlocks = recsText.split(/(?=\b\d+\s+[A-Z]{2})/);
    sectionBlocks.forEach(block => {
      // Parameter name: first ALL-CAPS word(s) at start of block
      const paramM = block.match(/^\d+\s+([A-Z][A-Z\s]+?)(?:\s+Add|\n)/);
      // Dose: "Add {number} {unit} of {chemical}"
      // Match "Add {qty} {unit} of {product}" — stop before any second verb (Dissolve, Filter, Clean, etc.)
      const raw = block.match(/Add\s+[\d.]+\s*(?:mls?|g|kg|L|tabs?)\s+(?:of\s+)?[A-Za-z][^.\n]{2,60}/i);
      const doseM = raw ? [raw[0].replace(/\s+(Dissolve|Filter|Clean|Backwash|Increase|away|in a bucket|Add\b)[\s\S]*/i, '').trim()] : null;
      if (doseM) {
        recs.push({
          action: doseM[0].trim(),
          param: paramM ? paramM[1].trim() : '',
        });
      }
    });
    
    // Fallback: use the doseRe matches directly
    if (recs.length === 0) {
      doseLines.forEach(a => recs.push({ action: a.trim(), param: '' }));
    }
  }

  return { date, pool, lsi, ph, freeCl, combCl, salt, alk, caHard, cya, phos, recs, raw: txt };
}

// Status helper
function calcStatus(val, lo, hi) {
  if (val === null || val === undefined) return 'ok';
  if (val < lo || val > hi) return 'bad';
  // warn if within 5% of the range width from either boundary
  const margin = (hi - lo) * 0.05;
  if (val < lo + margin || val > hi - margin) return 'warn';
  return 'ok';
}

// ─── Data ───────────────────────────────────────
// Metric definitions (ranges only — values populated after upload)
const METRIC_DEFS = [
  { id: 'ph',   label: 'pH',            lo: 7.2, hi: 7.6, unit: '',    min: 6.5, max: 9.0  },
  { id: 'fcl',  label: 'Free Chlorine', lo: 2,   hi: 4,   unit: 'ppm', min: 0,   max: 6    },
  { id: 'ccl',  label: 'Combined Cl',   lo: 0,   hi: 0.2, unit: 'ppm', min: 0,   max: 1    },
  { id: 'salt', label: 'Salt',          lo: 3500,hi: 5000,unit: 'ppm', min: 0,   max: 6000 },
  { id: 'alk',  label: 'Total Alk',     lo: 80,  hi: 120, unit: 'ppm', min: 0,   max: 200  },
  { id: 'cah',  label: 'Ca Hardness',   lo: 200, hi: 400, unit: 'ppm', min: 0,   max: 500  },
  { id: 'cya',  label: 'Cyanuric Acid', lo: 30,  hi: 100, unit: 'ppm', min: 0,   max: 150  },
  { id: 'phos', label: 'Phosphates',    lo: 0,   hi: 0.2, unit: 'ppm', min: 0,   max: 0.5  },
];

const EMPTY_TEST = {
  date: null,
  pool: '',
  lsi: null,
  metrics: METRIC_DEFS.map(m => ({ ...m, val: null, status: 'ok' })),
};

const TEST = EMPTY_TEST;
const TODOS = [];

const PH_HISTORY = [];

// ─── Trend Chart ────────────────────────────────
function TrendChart({ data, lo, hi, phMin = 7.0, phMax = 8.5 }) {
  if (!data || data.length < 2) {
    return (
      <div style={{ height: 90, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#b0bac8', fontSize: 12 }}>
        Need at least 2 tests to show a trend
      </div>
    );
  }
  // Normalize: ensure lo <= hi
  if (lo > hi) { const t = lo; lo = hi; hi = t; }

  const W = 295, H = 90;
  const pad = { l: 28, r: 8, t: 10, b: 20 };
  const cW = W - pad.l - pad.r;
  const cH = H - pad.t - pad.b;

  const px = (i) => pad.l + (i / (data.length - 1)) * cW;
  const py = (v) => pad.t + cH - ((v - phMin) / (phMax - phMin)) * cH;

  const pathD = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${px(i)} ${py(d.val)}`).join(' ');
  const areaD = `${pathD} L ${px(data.length - 1)} ${pad.t + cH} L ${px(0)} ${pad.t + cH} Z`;

  const loY = py(lo), hiY = py(hi);
  // hi value is higher on the number line → smaller y; band top = hiY, height = loY - hiY
  const bandTop = Math.min(loY, hiY);
  const bandH   = Math.abs(loY - hiY);

  // Tick labels at quartiles of [phMin, phMax]
  const ticks = [phMin, phMin + (phMax - phMin) * 0.33, phMin + (phMax - phMin) * 0.66, phMax];

  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{ overflow: 'visible' }}>
      {/* Target band */}
      <rect x={pad.l} y={bandTop} width={cW} height={bandH} fill="#00b4d8" opacity={0.1} rx={3} />
      <line x1={pad.l} y1={loY} x2={pad.l + cW} y2={loY} stroke="#00b4d8" strokeWidth={1} strokeDasharray="3 3" opacity={0.5} />
      <line x1={pad.l} y1={hiY} x2={pad.l + cW} y2={hiY} stroke="#00b4d8" strokeWidth={1} strokeDasharray="3 3" opacity={0.5} />

      {/* Area fill */}
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#e74c3c" stopOpacity="0.18" />
          <stop offset="100%" stopColor="#e74c3c" stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={areaD} fill="url(#areaGrad)" />

      {/* Line */}
      <path d={pathD} fill="none" stroke="#e74c3c" strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round" />

      {/* Points */}
      {data.map((d, i) => (
        <circle key={i} cx={px(i)} cy={py(d.val)} r={i === data.length - 1 ? 5 : 3.5}
          fill={d.val >= lo && d.val <= hi ? '#1a7a47' : '#e74c3c'}
          stroke="#fff" strokeWidth={1.5} />
      ))}

      {/* X labels */}
      {data.map((d, i) => (
        <text key={i} x={px(i)} y={H - 2} textAnchor="middle"
          style={{ fontSize: 9, fontFamily: 'DM Sans', fill: '#b0bac8', fontWeight: 600 }}>
          {d.label}
        </text>
      ))}

      {/* Y labels */}
      {ticks.map((v, i) => (
        <text key={i} x={pad.l - 4} y={py(v) + 3} textAnchor="end"
          style={{ fontSize: 8, fontFamily: 'DM Sans', fill: '#c8d0dc' }}>
          {v.toFixed(1)}
        </text>
      ))}

      {/* Target label */}
      <text x={pad.l + cW} y={Math.min(loY, hiY) - 3} textAnchor="end"
        style={{ fontSize: 8, fontFamily: 'DM Sans', fill: '#00b4d8', fontWeight: 700 }}>
        target
      </text>
    </svg>
  );
}

// ─── Single todo card (own component so hooks are top-level) ───
function TodoCard({ t, idx, onToggle, onDelete }) {
  const [swipeX, setSwipeX] = React.useState(0);
  const [swiping, setSwiping] = React.useState(false);
  const touchStart = React.useRef(null);
  const THRESHOLD = 60;

  const onTouchStart = (e) => { touchStart.current = e.touches[0].clientX; setSwiping(false); };
  const onTouchMove = (e) => {
    if (touchStart.current === null) return;
    const dx = e.touches[0].clientX - touchStart.current;
    if (dx < -10) { setSwiping(true); setSwipeX(Math.max(-80, dx)); }
  };
  const onTouchEnd = () => {
    if (swipeX < -THRESHOLD) { setSwipeX(-80); }
    else { setSwipeX(0); setSwiping(false); }
    touchStart.current = null;
  };

  return (
    <div className="todo-wrap" style={{ marginBottom: 0 }}>
      <div className="todo-delete-bg" onClick={() => onDelete(t.id)}>🗑️</div>
      <div className={`todo-card fade-up${t.done ? ' done' : ''}`}
        style={{ animationDelay: `${idx * 0.05}s`, transform: `translateX(${swipeX}px)`, transition: swiping ? 'none' : 'transform 0.25s ease' }}
        onClick={() => { if (swipeX < -10) { setSwipeX(0); return; } onToggle(t.id); }}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
        <div className="todo-accent" style={{ background: t.color }} />
        <div style={{ marginLeft: 4 }}>
          <div className={`todo-check${t.done ? ' checked' : ''}`}>{t.done ? '✓' : ''}</div>
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ display: 'flex', gap: 6, alignItems: 'center', marginBottom: 3 }}>
            <div style={{ background: `${t.color}18`, color: t.color, padding: '1px 6px', borderRadius: 6, fontSize: 9, fontWeight: 700, letterSpacing: '0.05em' }}>{t.pri}</div>
          </div>
          <div className="t-title" style={{ fontSize: 14, color: '#0b1f2e', lineHeight: 1.3 }}>{t.label}</div>
          <div style={{ color: '#8a9ab0', fontSize: 12, marginTop: 3 }}>{t.reason}</div>
        </div>
        {/* Desktop fallback delete button (visible when no touch) */}
        <button onClick={(e) => { e.stopPropagation(); onDelete(t.id); }}
          aria-label="Delete action"
          style={{ position: 'absolute', top: 8, right: 8, width: 24, height: 24, border: 'none', background: 'transparent', color: '#c8d0dc', fontSize: 14, cursor: 'pointer', borderRadius: 6 }}>×</button>
      </div>
    </div>
  );
}

// ─── Dashboard Screen ────────────────────────────
function Dashboard({ onNav, todos, onToggle, onDelete, toast, testData, onUpload, uploading, phHistory }) {
  testData = testData || TEST;
  const hasTest = !!testData.date;
  const ph = testData.metrics[0];
  const badCount = testData.metrics.filter(m => m.status !== 'ok').length;
  const doneCount = todos.filter(t => t.done).length;
  const openCount = todos.filter(t => !t.done).length;
  const pillCls = (status) => status === 'ok' ? 'pill-ok' : status === 'warn' ? 'pill-warn' : 'pill-bad';

  return (
    <div className="screen">
      {/* Hero */}
      <div className="hero">
        <div className="hero-waves" />
        <div style={{ position: 'relative', zIndex: 1 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 14 }}>
            <div>
              <div style={{ color: 'rgba(255,255,255,0.5)', fontSize: 11, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 4 }}>{hasTest ? 'Last tested ' + testData.date : 'No test data yet'}</div>
              <div className="t-display" style={{ color: '#fff', fontSize: 22, lineHeight: 1.2 }}>
                {hasTest ? (openCount === 0 ? 'All caught up' : (openCount + ' thing' + (openCount !== 1 ? 's' : '') + ' need attention')) : 'Upload a report to get started'}
              </div>
            </div>
            {hasTest && openCount > 0 && (
              <div style={{ background: 'rgba(231,76,60,0.2)', border: '1.5px solid rgba(231,76,60,0.4)', borderRadius: 12, padding: '6px 10px', textAlign: 'center' }}>
                <div style={{ color: '#ff8080', fontSize: 20, lineHeight: 1 }}>!</div>
                <div style={{ color: '#ff8080', fontSize: 9, fontWeight: 700, marginTop: 2 }}>URGENT</div>
              </div>
            )}
          </div>
          {hasTest && (
            <div style={{ display: 'flex', gap: 16, color: 'rgba(255,255,255,0.45)', fontSize: 11, fontWeight: 500 }}>
              <span>LSI {testData.lsi} ✓</span>
              <span>Salt ✓</span>
              <span>Temp 21°C</span>
            </div>
          )}

          {/* Upload zone inside hero */}
          <div className="upload-zone" style={{ marginTop: 16, opacity: uploading ? 0.6 : 1 }}
            onClick={onUpload}>
            <div style={{ fontSize: 28, lineHeight: 1 }}>📄</div>
            <div>
              <div style={{ color: '#00d4f5', fontFamily: 'Sora', fontWeight: 700, fontSize: 13 }}>{uploading ? 'Parsing PDF…' : 'Upload Poolwerx Report PDF'}</div>
              <div style={{ color: 'rgba(0,212,245,0.55)', fontSize: 11, marginTop: 2 }}>{uploading ? 'Please wait' : 'Tap to import latest test results'}</div>
            </div>
            <div style={{ marginLeft: 'auto', color: 'rgba(0,212,245,0.5)', fontSize: 16 }}>›</div>
          </div>
        </div>
      </div>

      {/* Pills */}
      <div className="pills-row" style={{ marginTop: 8 }}>
        {hasTest ? [
          { label: 'pH ' + testData.metrics[0].val, cls: pillCls(testData.metrics[0].status) },
          { label: 'Cl ' + testData.metrics[1].val, cls: pillCls(testData.metrics[1].status) },
          { label: 'Salt ' + (testData.metrics[3].status === 'ok' ? '✓' : testData.metrics[3].val), cls: pillCls(testData.metrics[3].status) },
          { label: badCount + ' issue' + (badCount !== 1 ? 's' : ''), cls: badCount > 0 ? 'pill-bad' : 'pill-ok' },
        ].map((p, i) => (
          <div key={i} className={`pill ${p.cls}`} onClick={() => onNav('chemistry')}>{p.label}</div>
        )) : <div style={{ color: '#b0bac8', fontSize: 12, padding: '6px 4px' }}>Results will appear here after upload</div>}
      </div>

      {/* pH Trend */}
      <div className="sec-head">
        <span>pH Trend — 6 months</span>
        {hasTest && <a onClick={() => onNav('chemistry')}>All metrics ›</a>}
      </div>
      {hasTest ? (
      <div className="chart-card fade-up">
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
          <div>
            <div className="t-label" style={{ color: '#b0bac8' }}>Current pH</div>
            <div className="t-display" style={{ fontSize: 28, color: ph.status === 'ok' ? '#1a7a47' : '#e74c3c', lineHeight: 1 }}>{ph.val}</div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ background: ph.status === 'ok' ? '#e3f5ec' : '#fde8e8', color: ph.status === 'ok' ? '#1a7a47' : '#c0392b', padding: '4px 10px', borderRadius: 10, fontSize: 11, fontWeight: 700 }}>{ph.status === 'ok' ? 'In range' : 'Out of range'}</div>
            <div style={{ color: '#b0bac8', fontSize: 11, marginTop: 4 }}>Target {ph.lo} – {ph.hi}</div>
          </div>
        </div>
        <TrendChart data={phHistory || []} lo={ph.lo} hi={ph.hi} />
      </div>
      ) : (
        <div className="chart-card" style={{ textAlign: 'center', padding: '28px 20px', color: '#b0bac8' }}>
          <div style={{ fontSize: 13 }}>pH trend will appear after your first upload</div>
        </div>
      )}

      {/* To-do */}
      <div className="sec-head">
        <span>Action list</span>
        <span style={{ color: '#b0bac8', fontSize: 12, fontWeight: 500 }}>{hasTest ? doneCount + '/' + todos.length + ' done' : ''}</span>
      </div>
      <div className="todo-list" style={{ paddingBottom: 100 }}>
        {!hasTest && (
          <div style={{ textAlign: 'center', padding: '40px 20px', color: '#b0bac8' }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>📄</div>
            <div style={{ fontFamily: 'Sora', fontWeight: 700, fontSize: 15, color: '#8a9ab0', marginBottom: 6 }}>No actions yet</div>
            <div style={{ fontSize: 13 }}>Upload your Poolwerx PDF above and your action list will populate automatically.</div>
          </div>
        )}
        {todos.map((t, i) => (
          <TodoCard key={t.id} t={t} idx={i} onToggle={onToggle} onDelete={onDelete} />
        ))}
        {hasTest && todos.length > 0 && doneCount === todos.length && (
          <div style={{ textAlign: 'center', padding: '32px 20px', color: '#1a7a47' }}>
            <div style={{ fontSize: 36, marginBottom: 8 }}>✓</div>
            <div style={{ fontFamily: 'Sora', fontWeight: 700, fontSize: 15, marginBottom: 4 }}>All actions done</div>
            <div style={{ fontSize: 12, color: '#8a9ab0' }}>Great work — pool's looking sharp.</div>
          </div>
        )}
      </div>

      {/* Toast */}
      <div className={`toast${toast ? ' show' : ''}`}>{toast}</div>
    </div>
  );
}

// ─── Chemistry Screen ────────────────────────────
function Chemistry({ onNav, testData, onReupload }) {
  testData = testData || TEST;
  const hasTest = !!testData.date;
  const pct = (v, mn, mx) => Math.max(0, Math.min(1, (v - mn) / (mx - mn)));
  const colors = { ok: '#1a7a47', bad: '#c0392b', warn: '#b05a00' };
  const bgColors = { ok: '#e3f5ec', bad: '#fde8e8', warn: '#fef3e2' };

  return (
    <div className="screen">
      <div style={{ background: 'linear-gradient(160deg, #0b2d45, #0e4a6e)', padding: 'calc(20px + env(safe-area-inset-top, 0px)) 20px 28px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
          <div style={{ color: 'rgba(255,255,255,0.55)', fontSize: 11, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase' }}>Water Chemistry</div>
          {hasTest && (
            <button onClick={onReupload} style={{ background: 'rgba(255,255,255,0.12)', color: '#fff', border: '1px solid rgba(255,255,255,0.2)', borderRadius: 999, padding: '4px 10px', fontSize: 11, fontWeight: 600, fontFamily: 'DM Sans', cursor: 'pointer' }}>↻ Re-upload</button>
          )}
        </div>
        <div className="t-display" style={{ color: '#fff', fontSize: 20 }}>{hasTest ? 'Test — ' + testData.date : 'Water Chemistry'}</div>
        {hasTest && <div style={{ color: 'rgba(255,255,255,0.4)', fontSize: 12, marginTop: 4 }}>{testData.pool}</div>}
        {hasTest && (
        <div style={{ display: 'flex', gap: 10, marginTop: 12 }}>
          <div style={{ background: 'rgba(255,255,255,0.1)', borderRadius: 10, padding: '6px 12px', color: '#fff', fontSize: 12, fontWeight: 600 }}>LSI {testData.lsi} ✓</div>
          <div style={{ background: 'rgba(231,76,60,0.25)', borderRadius: 10, padding: '6px 12px', color: '#ff8080', fontSize: 12, fontWeight: 600 }}>{testData.metrics.filter(m => m.status !== 'ok').length} out of range</div>
        </div>
        )}
      </div>

      {!hasTest ? (
        <div style={{ textAlign: 'center', padding: '60px 20px', color: '#b0bac8' }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>🧪</div>
          <div style={{ fontFamily: 'Sora', fontWeight: 700, fontSize: 15, color: '#8a9ab0', marginBottom: 6 }}>No test data yet</div>
          <div style={{ fontSize: 13 }}>Upload a Poolwerx PDF from the Dashboard to see your water chemistry.</div>
        </div>
      ) : (
      <div style={{ paddingTop: 16, paddingBottom: 100 }}>
        {testData.metrics.map((m, i) => {
          const loPct = pct(m.lo, m.min, m.max) * 100;
          const hiPct = pct(m.hi, m.min, m.max) * 100;
          const valPct = m.val != null ? pct(m.val, m.min, m.max) * 100 : null;
          const col = colors[m.status];
          const bg = bgColors[m.status];

          return (
            <div key={m.id} className="metric-card fade-up" style={{ animationDelay: `${i * 0.04}s` }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                <div>
                  <div className="t-label" style={{ color: '#8a9ab0', marginBottom: 2 }}>{m.label}</div>
                  <div className="t-display" style={{ fontSize: 26, color: col, lineHeight: 1 }}>
                    {m.val != null ? m.val : '—'}<span style={{ fontSize: 13, fontWeight: 500, marginLeft: 3 }}>{m.val != null ? m.unit : ''}</span>
                  </div>
                </div>
                <div style={{ background: bg, color: col, padding: '4px 10px', borderRadius: 10, fontSize: 11, fontWeight: 700, marginTop: 2 }}>
                  {m.status === 'ok' ? 'In range' : m.status === 'warn' ? 'Low' : 'Out of range'}
                </div>
              </div>
              <div className="range-track">
                <div className="range-zone" style={{ left: `${loPct}%`, width: `${hiPct - loPct}%` }} />
                {valPct != null && <div className="range-marker" style={{ left: `${valPct}%`, background: col }} />}
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', color: '#b0bac8', fontSize: 10, fontWeight: 500 }}>
                <span>{m.min}</span>
                <span style={{ color: '#00b4d8', fontWeight: 600 }}>target {m.lo}–{m.hi}</span>
                <span>{m.max}</span>
              </div>
            </div>
          );
        })}
      </div>
      )}
    </div>
  );
}

// ─── Log Screen ──────────────────────────────────
function Log({ onNav, todos, onToggle, testData, onLogEntry }) {
  testData = testData || TEST;
  const [chemical, setChemical] = React.useState('Hydrochloric Acid');
  const [amount, setAmount] = React.useState('500');
  const [unit, setUnit] = React.useState('mL');
  const [notes, setNotes] = React.useState('');
  const [saved, setSaved] = React.useState(false);
  const [showChemPicker, setShowChemPicker] = React.useState(false);
  const [showUnitPicker, setShowUnitPicker] = React.useState(false);
  const [logType, setLogType] = React.useState('chemical'); // chemical | backwash | aiper | note
  const [errMsg, setErrMsg] = React.useState('');

  const chemicals = ['Hydrochloric Acid', 'Non Chlorine Shock', 'Calcium Up', 'Sunblock', 'Algaecide', 'Clarifier', 'Chlorine', 'Other'];
  const units = ['mL', 'L', 'g', 'kg', 'tabs'];
  const pending = todos.filter(t => !t.done);

  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const localISO = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate()) + 'T' + pad(now.getHours()) + ':' + pad(now.getMinutes());
  const [datetime, setDatetime] = React.useState(localISO);
  const fmtDatetime = (iso) => {
    try { return new Date(iso).toLocaleString('en-AU', { day: 'numeric', month: 'short', year: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true }); }
    catch(e) { return iso; }
  };

  const handleSave = () => {
    setErrMsg('');
    if (logType === 'chemical' && (!amount || parseFloat(amount) <= 0)) {
      setErrMsg('Enter an amount greater than 0');
      return;
    }
    if (logType === 'note' && !notes.trim()) {
      setErrMsg('Add a note before saving');
      return;
    }
    setSaved(true);
    if (onLogEntry) {
      const d = new Date(datetime);
      const dateStr = d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
      onLogEntry({
        type: logType === 'chemical' ? `Added ${amount}${unit} ${chemical}` : logType === 'backwash' ? 'Backwash' : logType === 'aiper' ? 'Aiper Scuba run' : notes || 'Note',
        icon: logType === 'chemical' ? '🧪' : logType === 'backwash' ? '🔄' : logType === 'aiper' ? '🤖' : '✏️',
        date: dateStr,
        note: logType === 'note' ? '' : notes,
      });
    }
    // Reset form
    setNotes('');
    if (logType === 'chemical') setAmount('');
    setTimeout(() => setSaved(false), 2000);
  };

  const typeButtons = [
    { id: 'chemical', icon: '🧪', label: 'Chemical' },
    { id: 'backwash', icon: '🔄', label: 'Backwash' },
    { id: 'aiper',   icon: '🤖', label: 'Aiper Run' },
    { id: 'note',    icon: '✏️', label: 'Note' },
  ];

  return (
    <div className="screen" onClick={() => { setShowChemPicker(false); setShowUnitPicker(false); }}>
      <div style={{ background: 'linear-gradient(160deg, #0b2d45, #0e4a6e)', padding: 'calc(20px + env(safe-area-inset-top, 0px)) 20px 28px' }}>
        <div className="t-display" style={{ color: '#fff', fontSize: 24, lineHeight: 1.1 }}>Log Activity</div>
        <div style={{ color: 'rgba(255,255,255,0.55)', fontSize: 12, marginTop: 6 }}>Record doses, maintenance & notes</div>
      </div>

      {/* Type selector */}
      <div className="sec-head" style={{ marginTop: 12 }}><span>What are you logging?</span></div>
      <div className="quick-row">
        {typeButtons.map(b => (
          <div key={b.id} className="quick-btn"
            style={{ background: logType === b.id ? '#e8f6fb' : '#fff', border: logType === b.id ? '2px solid #00b4d8' : '2px solid transparent', borderRadius: 14 }}
            onClick={e => { e.stopPropagation(); setLogType(b.id); }}>
            <div className="icon">{b.icon}</div>
            {b.label}
          </div>
        ))}
      </div>

      {/* Chemical form */}
      {logType === 'chemical' && (
      <div className="log-form">
        {/* Chemical picker */}
        <div style={{ position: 'relative' }}>
          <div className="form-field" onClick={e => { e.stopPropagation(); setShowChemPicker(v => !v); setShowUnitPicker(false); }} style={{ cursor: 'pointer' }}>
            <div className="form-label">Chemical</div>
            <div className="form-select">
              <div className="form-val">{chemical}</div>
              <div className="chevron">{showChemPicker ? '▴' : '▾'}</div>
            </div>
          </div>
          {showChemPicker && (
            <div onClick={e => e.stopPropagation()} style={{ position: 'absolute', top: '100%', left: 0, right: 0, background: '#fff', borderRadius: 14, boxShadow: '0 8px 32px rgba(0,0,0,0.15)', zIndex: 100, overflow: 'hidden' }}>
              {chemicals.map(c => (
                <div key={c} style={{ padding: '13px 16px', borderBottom: '1px solid #f0f2f5', cursor: 'pointer', fontFamily: 'Sora', fontSize: 14, fontWeight: c === chemical ? 700 : 400, color: c === chemical ? '#00b4d8' : '#0b1f2e', background: c === chemical ? '#f0fbff' : '#fff' }}
                  onClick={() => { setChemical(c); setShowChemPicker(false); }}>
                  {c}
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Amount + Unit */}
        <div style={{ display: 'flex', gap: 10 }}>
          <div className="form-field" style={{ flex: 2 }}>
            <div className="form-label">Amount</div>
            <input value={amount} onChange={e => setAmount(e.target.value)} type="number" inputMode="decimal" placeholder="0"
              style={{ fontFamily: 'Sora', fontSize: 16, fontWeight: 600, color: '#0b1f2e', border: 'none', background: 'none', outline: 'none', width: '100%' }} />
          </div>
          <div style={{ position: 'relative', flex: 1 }}>
            <div className="form-field" onClick={e => { e.stopPropagation(); setShowUnitPicker(v => !v); setShowChemPicker(false); }} style={{ cursor: 'pointer' }}>
              <div className="form-label">Unit</div>
              <div className="form-select">
                <div className="form-val">{unit}</div>
                <div className="chevron">{showUnitPicker ? '▴' : '▾'}</div>
              </div>
            </div>
            {showUnitPicker && (
              <div onClick={e => e.stopPropagation()} style={{ position: 'absolute', top: '100%', left: 0, right: 0, background: '#fff', borderRadius: 14, boxShadow: '0 8px 32px rgba(0,0,0,0.15)', zIndex: 100, overflow: 'hidden' }}>
                {units.map(u => (
                  <div key={u} style={{ padding: '12px 16px', borderBottom: '1px solid #f0f2f5', cursor: 'pointer', fontFamily: 'Sora', fontSize: 14, fontWeight: u === unit ? 700 : 400, color: u === unit ? '#00b4d8' : '#0b1f2e' }}
                    onClick={() => { setUnit(u); setShowUnitPicker(false); }}>
                    {u}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        <div className="form-field">
          <div className="form-label">Date & Time</div>
          <input type="datetime-local" value={datetime} onChange={e => setDatetime(e.target.value)}
            style={{ fontFamily: 'DM Sans', fontSize: 14, color: '#0b1f2e', border: 'none', background: 'none', outline: 'none', width: '100%' }} />
        </div>
      </div>
      )}

      {/* Backwash / Aiper forms */}
      {(logType === 'backwash' || logType === 'aiper') && (
        <div className="log-form">
          <div className="form-field">
            <div className="form-label">Date & Time</div>
            <input type="datetime-local" value={datetime} onChange={e => setDatetime(e.target.value)}
              style={{ fontFamily: 'DM Sans', fontSize: 14, color: '#0b1f2e', border: 'none', background: 'none', outline: 'none', width: '100%' }} />
          </div>
          <div className="form-field">
            <div className="form-label">Notes (optional)</div>
            <input value={notes} onChange={e => setNotes(e.target.value)} placeholder="e.g. filter clean, good flow"
              style={{ fontFamily: 'DM Sans', fontSize: 14, color: '#0b1f2e', border: 'none', background: 'none', outline: 'none', width: '100%' }} />
          </div>
        </div>
      )}

      {/* Note form */}
      {logType === 'note' && (
        <div className="log-form">
          <div className="form-field">
            <div className="form-label">Note</div>
            <textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="What did you observe?"
              rows={3} style={{ fontFamily: 'DM Sans', fontSize: 14, color: '#0b1f2e', border: 'none', background: 'none', outline: 'none', width: '100%', resize: 'none' }} />
          </div>
          <div className="form-field">
            <div className="form-label">Date & Time</div>
            <input type="datetime-local" value={datetime} onChange={e => setDatetime(e.target.value)}
              style={{ fontFamily: 'DM Sans', fontSize: 14, color: '#0b1f2e', border: 'none', background: 'none', outline: 'none', width: '100%' }} />
          </div>
        </div>
      )}

      <div style={{ padding: '0 16px' }}>
        {errMsg && (
          <div style={{ background: '#fde8e8', color: '#c0392b', padding: '10px 14px', borderRadius: 12, fontSize: 12, fontWeight: 600, marginBottom: 10 }}>
            {errMsg}
          </div>
        )}
        <button className="btn-primary" style={{ marginBottom: 16 }} onClick={handleSave}>
          {saved ? '✓ Saved!' : 'Save Log Entry'}
        </button>
      </div>

      {/* Mark Poolwerx doses done */}
      {pending.length > 0 && (
        <>
          <div className="sec-head"><span>Mark Poolwerx doses done</span></div>
          <div style={{ padding: '0 16px', paddingBottom: 100 }}>
            <div style={{ background: '#fff', borderRadius: 16, overflow: 'hidden', boxShadow: '0 1px 8px rgba(0,0,0,0.05)' }}>
              <div style={{ padding: '10px 16px', background: '#f8fbff', borderBottom: '1px solid #eef0f5', color: '#8a9ab0', fontSize: 11, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase' }}>
                From test {testData.date}
              </div>
              {pending.map((t, i) => (
                <div key={t.id} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 16px', borderBottom: i < pending.length - 1 ? '1px solid #f0f2f5' : 'none', cursor: 'pointer' }}
                  onClick={() => onToggle(t.id)}>
                  <div className="todo-check" style={{ minWidth: 26 }}></div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: 'Sora', fontSize: 13, fontWeight: 600, color: '#0b1f2e' }}>{t.label}</div>
                    <div style={{ color: '#8a9ab0', fontSize: 11, marginTop: 1 }}>{t.reason}</div>
                  </div>
                  <div style={{ background: `${t.color}18`, color: t.color, padding: '2px 8px', borderRadius: 8, fontSize: 10, fontWeight: 700 }}>{t.pri}</div>
                </div>
              ))}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ─── History Screen ──────────────────────────────
function History({ onNav, entries: userEntries, onExport, onImport }) {
  const entries = userEntries || [];
  const fileRef = React.useRef(null);
  const handlePick = (e) => {
    const f = e.target.files && e.target.files[0];
    if (f) onImport(f);
    e.target.value = '';
  };

  return (
    <div className="screen">
      <input ref={fileRef} type="file" accept="application/json,.json" style={{ display: 'none' }} onChange={handlePick} />
      <div style={{ background: 'linear-gradient(160deg, #0b2d45, #0e4a6e)', padding: 'calc(20px + env(safe-area-inset-top, 0px)) 20px 28px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12 }}>
          <div style={{ minWidth: 0 }}>
            <div className="t-display" style={{ color: '#fff', fontSize: 24, lineHeight: 1.1 }}>History</div>
            <div style={{ color: 'rgba(255,255,255,0.55)', fontSize: 12, marginTop: 6 }}>Activity log & test history</div>
          </div>
          <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
            <button onClick={onExport} style={{ background: 'rgba(255,255,255,0.12)', color: '#fff', border: '1px solid rgba(255,255,255,0.2)', borderRadius: 999, padding: '6px 12px', fontSize: 11, fontWeight: 600, letterSpacing: '0.04em', textTransform: 'uppercase', cursor: 'pointer' }}>↓ Export</button>
            <button onClick={() => fileRef.current && fileRef.current.click()} style={{ background: 'rgba(255,255,255,0.12)', color: '#fff', border: '1px solid rgba(255,255,255,0.2)', borderRadius: 999, padding: '6px 12px', fontSize: 11, fontWeight: 600, letterSpacing: '0.04em', textTransform: 'uppercase', cursor: 'pointer' }}>↑ Import</button>
          </div>
        </div>
        <div style={{ color: 'rgba(255,255,255,0.4)', fontSize: 10, marginTop: 10, lineHeight: 1.5 }}>
          Backup or move your data between browsers/devices. Imports replace current data.
        </div>
      </div>

      <div style={{ padding: '16px 16px 100px' }}>
        {entries.length === 0 ? (
          <div style={{ textAlign: 'center', padding: '60px 20px', color: '#b0bac8' }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>📋</div>
            <div style={{ fontFamily: 'Sora', fontWeight: 700, fontSize: 15, color: '#8a9ab0', marginBottom: 6 }}>No activity yet</div>
            <div style={{ fontSize: 13 }}>Log a dose, backwash or Aiper run and it will appear here.</div>
          </div>
        ) : (
        <div style={{ background: '#fff', borderRadius: 16, overflow: 'hidden', boxShadow: '0 1px 8px rgba(0,0,0,0.05)' }}>
          {entries.map((e, i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '14px 16px', borderBottom: i < entries.length - 1 ? '1px solid #f0f2f5' : 'none' }}>
              <div style={{ width: 40, height: 40, borderRadius: 12, background: '#f4f6f9', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20, flexShrink: 0 }}>
                {e.icon}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontFamily: 'Sora', fontSize: 13, fontWeight: 600, color: '#0b1f2e', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{e.type}</div>
                {e.note && <div style={{ color: '#8a9ab0', fontSize: 11, marginTop: 2 }}>{e.note}</div>}
              </div>
              <div style={{ color: '#b0bac8', fontSize: 11, fontWeight: 600, flexShrink: 0 }}>{e.date}</div>
            </div>
          ))}
        </div>
        )}
      </div>
    </div>
  );
}

// ─── App ─────────────────────────────────────────
const LS_KEY = 'poolDashboard_v2';
const loadState = () => {
  try { const raw = localStorage.getItem(LS_KEY); return raw ? JSON.parse(raw) : null; }
  catch (e) { return null; }
};

function App() {
  const persisted = loadState();
  const [screen, setScreen] = React.useState('dashboard');
  const [todos, setTodos] = React.useState((persisted && persisted.todos) || []);
  const [toast, setToast] = React.useState('');
  const [testData, setTestData] = React.useState((persisted && persisted.testData) || TEST);
  const [uploading, setUploading] = React.useState(false);
  const [logEntries, setLogEntries] = React.useState((persisted && persisted.logEntries) || []);
  const [phHistory, setPhHistory] = React.useState((persisted && persisted.phHistory) || []);

  React.useEffect(() => {
    try { localStorage.setItem(LS_KEY, JSON.stringify({ todos, testData, logEntries, phHistory })); }
    catch (e) { /* quota / private mode */ }
  }, [todos, testData, logEntries, phHistory]);

  const onLogEntry = (entry) => {
    const now = new Date();
    const dateStr = now.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
    setLogEntries(prev => [{ ...entry, date: dateStr }, ...prev]);
    showToast('✓ ' + entry.type + ' logged');
  };
  const fileRef = React.useRef();

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(''), 2800);
  };

  const onDelete = (id) => {
    setTodos(prev => prev.filter(t => t.id !== id));
    showToast('Action removed');
  };

  const onToggle = (id) => {
    // Find the item first to log it to history
    setTodos(prev => {
      const item = prev.find(t => t.id === id);
      if (item && !item.done) {
        showToast('✓ Logged: ' + item.label);
        const now = new Date();
        const dateStr = now.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
        setLogEntries(le => [{ type: item.label, icon: '🧪', date: dateStr, note: item.reason }, ...le]);
        // Remove after tick-off animation
        setTimeout(() => setTodos(t => t.filter(x => x.id !== id)), 700);
        return prev.map(t => t.id === id ? { ...t, done: true } : t);
      }
      return prev;
    });
  };

  const handleFileChange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!file.name.toLowerCase().endsWith('.pdf')) { showToast('Please select a PDF file'); return; }
    setUploading(true);
    showToast('Reading PDF…');
    try {
      const parsed = await parsePoolwerxPDF(file);
      const vals = { ph: parsed.ph, fcl: parsed.freeCl, ccl: parsed.combCl, salt: parsed.salt, alk: parsed.alk, cah: parsed.caHard, cya: parsed.cya, phos: parsed.phos };
      const updatedMetrics = testData.metrics.map(m => {
        const v = vals[m.id];
        if (v === null || v === undefined) return m;
        return { ...m, val: v, status: calcStatus(v, m.lo, m.hi) };
      });
      const updated = { ...testData, date: parsed.date, pool: parsed.pool || testData.pool, lsi: parsed.lsi != null ? parsed.lsi : testData.lsi, metrics: updatedMetrics };
      setTestData(updated);
      if (parsed.ph != null) {
        const dateLabel = (parsed.date || '').split(' ').slice(0, 2).join(' ') || 'now';
        setPhHistory(prev => {
          const exists = prev.some(p => p.label === dateLabel);
          const next = exists ? prev.map(p => p.label === dateLabel ? { ...p, val: parsed.ph } : p) : [...prev, { label: dateLabel, val: parsed.ph }];
          return next.slice(-6);
        });
      }
      // Build todos from Poolwerx recommendations first, fall back to out-of-range metrics
      let newTodos = [];
      if (parsed.recs && parsed.recs.length > 0) {
        newTodos = parsed.recs.map((r, i) => {
          // Match rec to a metric to get priority colour
          const metric = updatedMetrics.find(m => m.status !== 'ok' && (
            r.param.toLowerCase().includes(m.label.toLowerCase().split(' ')[0]) ||
            r.action.toLowerCase().includes(m.label.toLowerCase().split(' ')[0])
          ));
          const status = metric ? metric.status : 'bad';
          return {
            id: i + 1,
            pri: status === 'bad' ? 'HIGH' : 'MED',
            label: r.action,
            reason: metric ? (metric.label + ' is ' + metric.val + ' · target ' + metric.lo + '–' + metric.hi + ' ' + metric.unit) : r.param,
            color: status === 'bad' ? '#e74c3c' : '#e07b39',
            done: false,
          };
        });
      } else {
        // No recommendations parsed — fall back to out-of-range metric list
        newTodos = updatedMetrics.filter(m => m.status !== 'ok').map((m, i) => ({
          id: i + 1, pri: m.status === 'bad' ? 'HIGH' : 'MED',
          label: m.label + ' out of range',
          reason: m.label + ' is ' + m.val + ' · target ' + m.lo + '–' + m.hi + ' ' + m.unit,
          color: m.status === 'bad' ? '#e74c3c' : '#e07b39', done: false,
        }));
      }
      setTodos(newTodos);
      console.log('Recs parsed:', parsed.recs);
      console.log('Todos built:', newTodos);
      showToast('✓ Loaded test from ' + parsed.date);
    } catch (err) {
      showToast('Could not parse PDF — try another file');
      console.error(err);
    }
    setUploading(false);
    e.target.value = '';
  };

  const triggerUpload = () => fileRef.current && fileRef.current.click();

  const onExport = () => {
    try {
      const payload = {
        app: 'poolDashboard',
        version: '2.3',
        exportedAt: new Date().toISOString(),
        data: { todos, testData, logEntries, phHistory },
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const stamp = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `pool-dashboard-backup-${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      showToast('✓ Backup downloaded');
    } catch (err) {
      console.error(err);
      showToast('Export failed');
    }
  };

  const onImport = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        const data = (parsed && parsed.data) ? parsed.data : parsed;
        if (!data || typeof data !== 'object') throw new Error('Invalid file');
        if (!window.confirm('Replace current data with the contents of this backup? This cannot be undone.')) return;
        if (Array.isArray(data.todos)) setTodos(data.todos);
        if (data.testData && data.testData.metrics) setTestData(data.testData);
        if (Array.isArray(data.logEntries)) setLogEntries(data.logEntries);
        if (Array.isArray(data.phHistory)) setPhHistory(data.phHistory);
        showToast('✓ Backup restored');
      } catch (err) {
        console.error(err);
        showToast('Import failed — not a valid backup');
      }
    };
    reader.onerror = () => showToast('Could not read file');
    reader.readAsText(file);
  };

  const screens = {
    dashboard: <Dashboard onNav={setScreen} todos={todos} onToggle={onToggle} onDelete={onDelete} toast={toast} testData={testData} onUpload={triggerUpload} uploading={uploading} phHistory={phHistory} />,
    chemistry: <Chemistry onNav={setScreen} testData={testData} onReupload={triggerUpload} />,
    log: <Log onNav={setScreen} todos={todos} onToggle={onToggle} testData={testData} onLogEntry={onLogEntry} />,
    history: <History onNav={setScreen} entries={logEntries} onExport={onExport} onImport={onImport} />,
  };

  const navItems = [
    { id: 'dashboard', icon: '⌂', label: 'Dashboard' },
    { id: 'chemistry', icon: '🧪', label: 'Chemistry' },
    { id: 'log',       icon: '＋', label: 'Log' },
    { id: 'history',   icon: '📋', label: 'History' },
  ];

  return (
    <React.Fragment>
      <input ref={fileRef} type="file" accept=".pdf" style={{ display: 'none' }} onChange={handleFileChange} />
      <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', width: '100%', background: '#f4f6f9' }}>
        <div style={{ flex: 1, overflow: 'hidden', position: 'relative' }}>
          {screens[screen]}
        </div>
        <nav className="bottom-nav">
          {navItems.map(n => (
            <div key={n.id} className={`nav-item${screen === n.id ? ' active' : ''}`} onClick={() => setScreen(n.id)}>
              <div className="nav-icon">{n.icon}</div>
              {n.label}
            </div>
          ))}
        </nav>
      </div>
    </React.Fragment>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
<div id="root" style="width:100%;min-height:100vh;"></div>
</body>
</html>
